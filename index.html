<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>La friteuse à mèmes</title>
    <!--
      Cette page est le point d’entrée de l’application React.  Elle expose
      simplement un conteneur <div id="root"></div> dans lequel
      React montera le composant principal.  Le CSS est importé via
      App.css et les scripts JavaScript/TypeScript sont référencés à la
      fin du document.  Vous devrez construire ou transpiler les sources
      (index.tsx, App.tsx) avec un bundler comme Vite ou Webpack pour
      produire du JavaScript utilisable par le navigateur.
    -->
    <link rel="stylesheet" href="src/App.css" />
  </head>
  <body>
    <noscript>
      Vous devez activer JavaScript pour profiter de l'application.
    </noscript>
    <div id="root"></div>
    <!--
      Incluez ici le script compilé (par exemple dist/main.js) lorsque vous
      construisez l’application.  Si vous utilisez un outil comme Vite ou
      Parcel, ce script sera généré automatiquement.  L’importation directe
      de TypeScript (src/index.tsx) ne fonctionnera pas dans un navigateur
      sans transpilation.
    -->
    <script type="module" src="src/index.tsx"></script>
  </body>
</html>
